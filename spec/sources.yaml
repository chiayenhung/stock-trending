schema_version: 1.0.0
sources:
  demo_static:
    enabled: true
    provenance_class: fixture
    retention: repository_fixture
  broker_quotes:
    enabled: false
    credential_scope: read_only
  news:
    enabled: true
    content_is_untrusted: true
    adapter: sec_edgar_html
    page_url: https://www.sec.gov/cgi-bin/browse-edgar
    allowed_host: www.sec.gov
    user_agent_env: STOCKTREND_SEC_USER_AGENT
    timeout_seconds: 20
    max_age_days: 90
    max_items_per_instrument: 2
    form_types: [8-K, 10-K, 10-Q, 6-K, 20-F]
    license_class: us_government_public_content
    extraction:
      method: deterministic_html
      llm_fallback_enabled: false
      model: null
  industry:
    enabled: true
    content_is_untrusted: true
    adapter: eia_today_in_energy_html
    page_url: https://www.eia.gov/todayinenergy/
    allowed_host: www.eia.gov
    timeout_seconds: 20
    max_age_days: 60
    max_items: 3
    applicable_buckets: [power_infrastructure]
    relevance_keywords:
      - electricity
      - electric grid
      - generation
      - generating capacity
      - nuclear
      - solar
      - wind
      - data center
      - power demand
    license_class: us_government_public_content
    extraction:
      method: deterministic_html
      llm_fallback_enabled: false
      model: null
  social:
    enabled: true
    content_is_untrusted: true
    official_api_required: true
    allowlist: []
production:
  approved_adapter: tiingo_market_data
  snapshot_max_age_seconds: 900
  heartbeat_max_age_seconds: 900
  quote_max_age_seconds: 900
  bar_metrics_max_age_seconds: 172800
adapters:
  http_json_gateway:
    enabled: false
    credential_scope: read_only
    endpoint_env: STOCKTREND_MARKET_DATA_URL
    allowed_host_env: STOCKTREND_MARKET_DATA_HOST
    token_env: STOCKTREND_MARKET_DATA_TOKEN
    token_required: true
    timeout_seconds: 30
    license_class: configured_market_data
    redirects_allowed: false
  tiingo_market_data:
    enabled: true
    credential_scope: read_only
    base_url: https://api.tiingo.com
    allowed_host: api.tiingo.com
    token_env: STOCKTREND_TIINGO_API_TOKEN
    token_required: true
    timeout_seconds: 30
    license_class: tiingo_internal_use_market_data
    redirects_allowed: false
