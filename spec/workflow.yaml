schema_version: 1.0.0
workflow_version: 3.0.0
reference_market: XNAS
scope: research_only
stages:
  - source_snapshot
  - source_coverage_gate
  - ingest
  - normalize
  - screen
  - analyze
  - deterministic_validate
  - cross_vendor_validate
  - render
  - artifact_qa
  - generate_research_analysis_email
  - generate_system_logs_email
  - finalize
  - committer
retry_policy:
  producer_attempts: 2
  validator_attempts: 1
  validator_unavailable: publish_with_degraded_status
state:
  atomic_writes: true
  dependency_hashes: true
  lease_seconds: 300
notifications:
  summary_email_recipient: hodalalala@gmail.com
  delivery: host_connector
  emails_per_batch:
    - trending_analysis
    - system_logs
  delivery_requires_state: committed
